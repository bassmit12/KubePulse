name: Build and Publish Images (GHCR)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Encore CLI
        run: |
          curl -L https://encore.dev/install.sh | bash
          echo "$HOME/.encore/bin" >> $GITHUB_PATH

      - name: Define image tags
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_SHA=ghcr.io/$OWNER_LC/kubepulse-backend:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "BACKEND_LATEST=ghcr.io/$OWNER_LC/kubepulse-backend:latest" >> $GITHUB_ENV
          echo "FRONTEND_SHA=ghcr.io/$OWNER_LC/kubepulse-frontend:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "FRONTEND_LATEST=ghcr.io/$OWNER_LC/kubepulse-frontend:latest" >> $GITHUB_ENV

      - name: Build and push backend image (SHA)
        working-directory: backend-encore
        run: |
          encore build docker "$BACKEND_SHA" --push

      - name: Build and push backend image (latest)
        working-directory: backend-encore
        run: |
          encore build docker "$BACKEND_LATEST" --push

      - name: Build and push frontend images
        run: |
          docker build -t "$FRONTEND_SHA" -t "$FRONTEND_LATEST" ./frontend
          docker push "$FRONTEND_SHA"
          docker push "$FRONTEND_LATEST"
