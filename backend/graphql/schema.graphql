# KubePulse AI GraphQL (MVP starter)

type Query {
  health: String!
  services(namespace: String): [Service!]!
  incidents(status: IncidentStatus): [Incident!]!
}

type Service {
  id: ID!
  name: String!
  namespace: String!
  status: ServiceStatus!
  p95LatencyMs: Float
  errorRate: Float
}

enum ServiceStatus {
  HEALTHY
  WARNING
  CRITICAL
}

type Incident {
  id: ID!
  title: String!
  status: IncidentStatus!
  severity: Severity!
  startedAt: String!
}

enum IncidentStatus {
  OPEN
  INVESTIGATING
  MITIGATED
  RESOLVED
}

enum Severity {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}
