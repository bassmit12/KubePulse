apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubepulse-backend
  namespace: kubepulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubepulse-backend
  template:
    metadata:
      labels:
        app: kubepulse-backend
    spec:
      containers:
      - name: backend
        image: kubepulse/backend:dev
        ports:
        - containerPort: 8080
